# Local stack: build the repo Dockerfile and run the app on http://localhost:3000
# (API + static UI, same origin). No Caddy — no TLS setup required.
#
# From repo root:
#   docker compose -f deploy/docker-compose.local.yml up --build
#
# Or: bun run docker:local

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: skyrim-alchemy:local
    ports:
      - "${LOCAL_PORT:-3000}:3000"
    environment:
      STATIC_ROOT: /app/web/dist
      PORT: "3000"
      # Omit ALCHEMY_SQLITE_PATH to use the bundled DB inside the image.
